<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>7-11 揪團購 · 店員後台</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap');
:root{
  --red:#E8321C;--orange:#F47920;--green:#007B40;
  --line:#06C755;--ink:#1C1C1E;--muted:#8e8e93;
  --border:#e5e5ea;--surface:#F2F2F7;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--surface);color:var(--ink);max-width:430px;margin:0 auto;padding-bottom:32px}
.spinner-wrap{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;transition:opacity .4s}
.spinner-wrap.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:'Oswald',sans-serif;font-size:28px;color:var(--white)}.sp-logo em{color:var(--red);font-style:normal}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--line);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOP BAR */
.topbar{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-logo{font-family:'Oswald',sans-serif;font-size:18px;color:var(--white);display:flex;align-items:center;gap:6px}
.tb-badge{background:var(--red);color:var(--white);font-size:9px;padding:2px 5px;border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-weight:700}
.tb-admin{font-size:11px;color:var(--line);font-weight:700}

/* CARD */
.card{background:var(--white);border-radius:14px;overflow:hidden;margin:12px 12px 0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.card-body{padding:14px}

/* STATS */
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sbox{background:var(--surface);border-radius:10px;padding:10px 6px;text-align:center}
.snum{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700}
.slbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}

/* BAR CHART */
.bar-row{margin-bottom:8px}
.bar-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-name{font-weight:700}
.bar-cnt{color:var(--muted)}
.bar-track{background:var(--surface);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{background:var(--red);height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ORDER LIST */
.orow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.orow:last-child{border-bottom:none}
.oavatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--surface);flex-shrink:0}
.oname{font-size:14px;font-weight:700}
.odtl{font-size:11px;color:var(--muted);margin-top:2px}
.oamt{font-family:'Oswald',sans-serif;font-size:16px;color:var(--green);margin-left:auto;flex-shrink:0}

/* FORM */
.fld{margin-bottom:12px}
.flbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.finp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;color:var(--ink)}
.finp:focus{border-color:var(--red);background:var(--white)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* PRODUCT EDITOR */
.prod-edit-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.prod-edit-row:last-child{border-bottom:none}
.pe-em{font-size:20px;cursor:pointer}
.pe-name{flex:1;font-size:13px;font-weight:700}
.pe-price{font-size:13px;color:var(--muted);min-width:40px;text-align:right}
.pe-del{color:var(--red);font-size:18px;cursor:pointer;padding:0 4px}

/* AI PANEL */
.ai-panel{background:var(--ink);border-radius:12px;padding:14px;margin-top:10px;display:none;position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(232,50,28,.2),transparent 60%);pointer-events:none}
.ai-chip{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:var(--white);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.ai-txt{color:rgba(255,255,255,.9);font-size:13px;line-height:1.7;white-space:pre-wrap}
.dots span{display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;animation:bob 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bob{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:10px;font-size:14px;font-weight:700;padding:11px 16px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.96);opacity:.85}
.btn-red{background:var(--red);color:var(--white)}
.btn-green{background:var(--green);color:var(--white)}
.btn-dark{background:var(--ink);color:var(--white)}
.btn-outline{background:var(--white);color:var(--ink);border:1.5px solid var(--border)}
.btn-warn{background:#ff3b30;color:var(--white)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}

/* NOTICE */
.notice-out{background:#f0fff4;border:1.5px solid var(--green);border-radius:10px;padding:12px;font-size:12px;line-height:1.8;color:#1a4a2e;white-space:pre-wrap;margin-top:10px;display:none}
.sheets-link{display:flex;align-items:center;gap:10px;background:#e8f5e9;border:1.5px solid #4caf50;border-radius:10px;padding:12px 14px;text-decoration:none;color:#1b5e20}
.sheets-link:active{opacity:.8}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill-g{background:#e8f8ef;color:var(--green)}
.pill-r{background:#fff0ee;color:var(--red)}
.pill-o{background:#fff7e6;color:var(--orange)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--white);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PASSWORD SCREEN */
.pw-screen{position:fixed;inset:0;background:var(--surface);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200}
.pw-icon{font-size:48px;margin-bottom:12px}
.pw-ttl{font-size:20px;font-weight:900;margin-bottom:4px}
.pw-sub{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center}
</style>
</head>
<body>

<!-- Loading -->
<div class="spinner-wrap" id="loading">
  <div class="sp-logo"><em>7-11</em> 後台</div>
  <div class="spinner"></div>
</div>

<!-- 密碼驗證 -->
<div class="pw-screen" id="pw-screen">
  <div class="pw-icon">🔐</div>
  <div class="pw-ttl">店員後台</div>
  <div class="pw-sub">請輸入管理密碼才能進入</div>
  <div style="width:100%;max-width:300px">
    <input class="finp" type="password" id="pw-input" placeholder="輸入密碼" style="margin-bottom:10px">
    <button class="btn btn-red btn-full" onclick="checkPw()">進入後台</button>
  </div>
</div>

<!-- 主畫面 -->
<div id="main" style="display:none">

  <div class="topbar">
    <div class="tb-logo"><span class="tb-badge">7-11</span> 揪團購</div>
    <div class="tb-admin">📋 店員後台</div>
  </div>

  <!-- 開團設定 -->
  <div class="card">
    <div class="card-head">
      <div class="card-ttl">🆕 建立 / 更新團購</div>
      <button class="btn btn-xs btn-red" onclick="aiGenCopy()">✨ AI 文案</button>
    </div>
    <div class="card-body">
      <div class="fld">
        <label class="flbl">團購名稱</label>
        <input class="finp" id="f-title" placeholder="例：思念湯圓冬至限定團">
      </div>
      <div class="row2">
        <div class="fld"><label class="flbl">截止日期</label><input class="finp" type="date" id="f-date"></div>
        <div class="fld"><label class="flbl">截止時間</label><input class="finp" type="time" id="f-time" value="22:00"></div>
      </div>
      <div class="fld">
        <label class="flbl">收款方式</label>
        <input class="finp" id="f-pay" value="7-11 取貨付款">
      </div>

      <!-- 商品列表 -->
      <div class="flbl" style="margin-bottom:6px">商品列表</div>
      <div id="prod-edit-list"></div>
      <button class="btn btn-xs btn-outline btn-full" style="margin-top:8px" onclick="addProdRow()">+ 新增商品</button>

      <div style="height:12px"></div>
      <button class="btn btn-red btn-full" onclick="createBuy()">🚀 開團（覆蓋現有）</button>

      <!-- AI 文案 -->
      <div class="ai-panel" id="ai-cp">
        <div class="ai-chip">✦ AI 記事本文案</div>
        <div id="ai-cp-txt" class="ai-txt"></div>
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn btn-xs btn-red" onclick="cpTxt('ai-cp-txt')">📋 複製</button>
          <button class="btn btn-xs" style="background:rgba(255,255,255,.15);color:#fff;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit" onclick="aiGenCopy()">🔄 重生成</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 訂單統計 -->
  <div class="card">
    <div class="card-head">
      <div class="card-ttl">📊 即時統計</div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="pill pill-g" id="stat-pill">0 筆</span>
        <button class="btn btn-xs btn-outline" onclick="loadStats()">🔄</button>
      </div>
    </div>
    <div class="card-body" id="stats-body">
      <div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0">點🔄載入統計</div>
    </div>
  </div>

  <!-- LINE 通知 -->
  <div class="card">
    <div class="card-head"><div class="card-ttl">📣 LINE 通知</div></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-outline btn-full btn-sm" onclick="genNotice('open')">🎉 開團公告</button>
      <button class="btn btn-outline btn-full btn-sm" onclick="genNotice('remind')">⏰ 催單提醒</button>
      <button class="btn btn-outline btn-full btn-sm" onclick="genNotice('summary')">📦 訂單匯總</button>
      <button class="btn btn-dark btn-full btn-sm" onclick="genNotice('close')">🔒 截止公告</button>
      <div class="notice-out" id="n-out"></div>
      <button class="btn btn-xs btn-green btn-full" id="n-cp-btn" style="display:none" onclick="cpTxt('n-out')">📋 複製訊息</button>
    </div>
  </div>

  <!-- Google Sheets 連結 -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-head"><div class="card-ttl">📊 Google Sheets 即時表格</div></div>
    <div class="card-body">
      <a class="sheets-link" id="sheets-link" href="#" target="_blank">
        <span style="font-size:28px">📋</span>
        <div>
          <div style="font-weight:700;font-size:14px">開啟試算表</div>
          <div style="font-size:11px;opacity:.7;margin-top:2px">訂單即時同步到 Google Sheets</div>
        </div>
        <span style="margin-left:auto;font-size:18px">→</span>
      </a>
      <div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.7;text-align:center">
        訂單自動寫入，支援篩選、匯出 Excel<br>可設定共享給其他店員
      </div>
      <div style="height:10px"></div>
      <button class="btn btn-warn btn-full btn-sm" onclick="confirmClose()">🔒 關閉目前團購</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// 設定區
// ══════════════════════════════════════════════
const CONFIG = {
  LIFF_ID:       '2009774173-Bdaku6TS',
  GAS_URL:       'https://script.google.com/macros/s/AKfycby4DbPFuyU8QLq9gdlcWj2MoyYHvSw2beTxel29HEUFDeg8m-VCZdM0ENGHKkWH3wY/exec',
  ADMIN_KEY:     '666666',
  SHEET_URL:     'https://docs.google.com/spreadsheets/d/1zyiM4fiErV14YEaX5cV87qm3rXxhRrHXe2A6PdxIRKY/edit?gid=2115586586#gid=2115586586',
  ALLOWED_USERS: [],
};

let user = null;
let currentBuy = null;
let statsCache = null;
let editProds = [
  { name:'', price:'', emoji:'🛍', desc:'' }
];

// ══════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════
async function init() {
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });

    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    user = { userId: profile.userId, displayName: profile.displayName };

    hideLoading();

    // 白名單驗證
    if (CONFIG.ALLOWED_USERS.length > 0 && !CONFIG.ALLOWED_USERS.includes(user.userId)) {
      const pw = document.getElementById('pw-screen');
      pw.style.display = 'flex';
      pw.innerHTML = '<div style="padding:40px;text-align:center"><div style="font-size:48px">⛔</div><div style="font-size:18px;font-weight:900;margin-top:12px">無存取權限</div><div style="font-size:13px;color:#888;margin-top:8px">userId: ' + user.userId + '</div></div>';
      return;
    }

    // 顯示密碼輸入
    const pw = document.getElementById('pw-screen');
    pw.style.display = 'flex';

  } catch(err) {
    hideLoading();
    const pw = document.getElementById('pw-screen');
    pw.style.display = 'flex';
    pw.innerHTML = '<div style="padding:40px;text-align:center"><div style="font-size:48px">❌</div><div style="font-size:16px;font-weight:900;margin-top:12px">初始化失敗</div><div style="font-size:12px;color:#888;margin-top:8px">' + err.message + '</div></div>';
  }
}

function checkPw() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) { toast('❗ 請輸入密碼'); return; }
  CONFIG.ADMIN_KEY = pw;
  document.getElementById('pw-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('sheets-link').href = CONFIG.SHEET_URL;

  // 載入現有團購
  loadCurrentBuy();
  renderProdEdit();
}

async function loadCurrentBuy() {
  try {
    const res = await api({ action: 'getActiveBuy' });
    if (!res.error) {
      currentBuy = res;
      document.getElementById('f-title').value = res.title;
      const d = new Date(res.deadline);
      document.getElementById('f-date').value = d.toISOString().slice(0,10);
      document.getElementById('f-time').value =
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      document.getElementById('f-pay').value = res.payment;
      editProds = res.products.map(p => ({...p, price: String(p.price)}));
      renderProdEdit();
    }
  } catch(e) { /* 沒有現有團購，不處理 */ }
}

// ══════════════════════════════════════════════
// 商品編輯
// ══════════════════════════════════════════════
function renderProdEdit() {
  const wrap = document.getElementById('prod-edit-list');
  wrap.innerHTML = editProds.map((p,i) => `
    <div class="prod-edit-row">
      <div class="pe-em" onclick="pickEmoji(${i})">${p.emoji||'🛍'}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:4px">
        <input class="finp" style="padding:6px 8px;font-size:13px" value="${p.name||''}"
          placeholder="商品名稱" oninput="editProds[${i}].name=this.value">
        <input class="finp" style="padding:6px 8px;font-size:13px;width:100px" value="${p.price||''}"
          type="number" placeholder="價格" oninput="editProds[${i}].price=this.value">
      </div>
      <div class="pe-del" onclick="removeProd(${i})">✕</div>
    </div>
  `).join('');
}

function addProdRow() {
  editProds.push({ name:'', price:'', emoji:'🛍', desc:'' });
  renderProdEdit();
}

function removeProd(i) {
  if (editProds.length <= 1) { toast('❗ 至少要有一個商品'); return; }
  editProds.splice(i, 1);
  renderProdEdit();
}

const EMOJIS = ['🛍','🍱','🍣','🍜','🍙','🥤','🧃','🍡','🎁','🥩','🍗','🥚','🧁','🍰','☕','🧋'];
function pickEmoji(i) {
  const cur = editProds[i].emoji;
  const next = EMOJIS[(EMOJIS.indexOf(cur) + 1) % EMOJIS.length];
  editProds[i].emoji = next;
  renderProdEdit();
}

// ══════════════════════════════════════════════
// 建立團購
// ══════════════════════════════════════════════
async function createBuy() {
  const title = document.getElementById('f-title').value.trim();
  const date  = document.getElementById('f-date').value;
  const time  = document.getElementById('f-time').value;
  const pay   = document.getElementById('f-pay').value.trim();

  if (!title || !date || !pay) { toast('❗ 請填寫完整資訊'); return; }

  const validProds = editProds.filter(p => p.name && p.price);
  if (!validProds.length) { toast('❗ 請至少填寫一個商品'); return; }

  const deadline = new Date(`${date}T${time}:00`).toISOString();
  const products = validProds.map(p => ({
    name: p.name, price: Number(p.price), emoji: p.emoji, desc: p.desc || ''
  }));

  try {
    const res = await api({
      action: 'createBuy', adminKey: CONFIG.ADMIN_KEY,
      title, deadline, payment: pay, products
    });
    if (res.error) throw new Error(res.error);
    const buyLink = `https://liff.line.me/2009774173-GjL4NQ1g?buyId=${res.buyId}`;
    toast('✅ 開團成功！');
    currentBuy = { id: res.buyId, title };
    // 顯示此團專屬連結
    document.getElementById('ai-cp').style.display = 'block';
    document.getElementById('ai-cp-txt').textContent = `📌 此團專屬下單連結：\n${buyLink}\n\n複製後貼到 LINE 記事本底部，成員點擊即可下單！`;
    loadStats();
  } catch(e) {
    toast('❌ ' + e.message);
  }
}

// ══════════════════════════════════════════════
// 統計
// ══════════════════════════════════════════════
async function loadStats() {
  const body = document.getElementById('stats-body');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)"><div class="spinner" style="margin:0 auto"></div></div>';

  try {
    const res = await api({ action: 'getAllStats', adminKey: CONFIG.ADMIN_KEY });
    if (res.error) throw new Error(res.error);
    statsCache = res.buys[0]; // 預設第一筆給通知用
    document.getElementById('stat-pill').textContent = res.buys.length + ' 團';
    renderAllStats(res.buys);
  } catch(e) {
    body.innerHTML = `<div style="color:var(--red);font-size:13px;text-align:center;padding:12px">${e.message}</div>`;
  }
}

function renderAllStats(buys) {
  if (!buys.length) {
    document.getElementById('stats-body').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">尚無團購</div>';
    return;
  }

  document.getElementById('stats-body').innerHTML = buys.map((b, idx) => {
    const maxQ = Math.max(...Object.values(b.productCount || {}), 1);
    const breakdown = Object.entries(b.productCount || {}).map(([name, qty]) => `
      <div class="bar-row">
        <div class="bar-info"><span class="bar-name">${name}</span><span class="bar-cnt">${qty}份</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(qty/maxQ*100)}%"></div></div>
      </div>`).join('');

    const orderRows = b.orders.map(o => `
      <div class="orow">
        <img class="oavatar" src="${o.avatarUrl||'https://via.placeholder.com/34'}" onerror="this.src='https://via.placeholder.com/34'">
        <div style="flex:1;min-width:0"><div class="oname">${o.displayName}</div><div class="odtl">${o.itemsStr}</div></div>
        <div class="oamt">$${o.total}</div>
      </div>`).join('');

    const statusBadge = b.isOpen
      ? '<span style="background:#e8f8ef;color:#007B40;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">● 開放中</span>'
      : '<span style="background:#f5f5f5;color:#8e8e93;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">已截止</span>';

    return `
      <div style="margin-bottom:${idx < buys.length-1 ? '16px' : '0'};padding-bottom:${idx < buys.length-1 ? '16px' : '0'};border-bottom:${idx < buys.length-1 ? '2px solid var(--border)' : 'none'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:14px;font-weight:900">${b.title}</div>
          ${statusBadge}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px">⏰ ${formatDeadline(b.deadline)} ｜ 🔗 <span style="font-family:monospace;font-size:10px;user-select:all">?buyId=${b.id}</span></div>
        <div class="stats3">
          <div class="sbox"><div class="snum" style="color:var(--red)">${b.count}</div><div class="slbl">訂單數</div></div>
          <div class="sbox"><div class="snum" style="color:var(--orange)">${b.totalItems}</div><div class="slbl">總份數</div></div>
          <div class="sbox"><div class="snum" style="color:var(--green);font-size:17px">$${b.totalRevenue}</div><div class="slbl">總金額</div></div>
        </div>
        ${breakdown}
        ${b.orders.length ? `<div style="height:1px;background:var(--border);margin:8px 0"></div>${orderRows}` : '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">尚無訂單</div>'}
        ${b.isOpen ? `<button class="btn btn-warn btn-full btn-sm" style="margin-top:10px" onclick="confirmClose('${b.id}','${b.title}')">🔒 關閉此團</button>` : ''}
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// AI 文案
// ══════════════════════════════════════════════
async function aiGenCopy() {
  const panel = document.getElementById('ai-cp');
  const txt = document.getElementById('ai-cp-txt');
  panel.style.display = 'block';
  txt.innerHTML = '<span style="color:rgba(255,255,255,.5);font-size:12px">生成中 <span class="dots"><span></span><span></span><span></span></span></span>';

  const title = document.getElementById('f-title').value || '7-11 限定團購';
  const prods = editProds.filter(p=>p.name&&p.price).map(p=>`${p.emoji}${p.name} $${p.price}`).join('、');
  const dl = document.getElementById('f-date').value + ' ' + document.getElementById('f-time').value;
  const pay = document.getElementById('f-pay').value;

  const prompt = `你是 7-11 門市 LINE 群組店員，請寫一則記事本團購公告。
要求：繁體中文、emoji、親切活潑、含商品清單+截止+下單方式+付款，150字內，格式清楚。
團購：${title} | 商品：${prods} | 截止：${dl} | 付款：${pay} | 下單：點記事本連結（10秒）`;

  try {
    const res = await api({ action: 'aiProxy', adminKey: CONFIG.ADMIN_KEY, prompt });
    if (res.error) throw new Error(res.error);
    typewriter(txt, res.text);
  } catch(e) {
    typewriter(txt, `🍱【${title}】開囉！\n\n${prods.split('、').join('\n')}\n\n⏰ 截止：${dl}\n💳 ${pay}\n\n📲 點連結下單，10秒搞定！`);
  }
}

// ══════════════════════════════════════════════
// 通知生成
// ══════════════════════════════════════════════
let lastNotice = '';
async function genNotice(type) {
  const out = document.getElementById('n-out');
  const btn = document.getElementById('n-cp-btn');
  out.style.display = 'block';
  btn.style.display = 'none';
  out.textContent = '⏳ 生成中…';

  const title = document.getElementById('f-title').value || '7-11 團購';
  const dl = document.getElementById('f-date').value + ' ' + document.getElementById('f-time').value;
  const s = statsCache;
  const typeMap = {open:'開團公告',remind:'催單提醒',summary:'訂單匯總',close:'截止公告'};

  const prompt = `請生成 7-11 LINE 群組「${typeMap[type]}」訊息。繁中、emoji、120字內、親切有效率。
團購：${title} | 訂單：${s?.count||0}筆 | 金額：$${s?.totalRevenue||0} | 截止：${dl} | 付款：${document.getElementById('f-pay').value}`;

  try {
    const res = await api({ action: 'aiProxy', adminKey: CONFIG.ADMIN_KEY, prompt });
    if (res.error) throw new Error(res.error);
    lastNotice = res.text;
  } catch(e) {
    const defs = {
      open: `🎉【${title}】開團！\n\n點記事本連結 10 秒下單 👇\n截止 ${dl}，欲購從速！`,
      remind: `⏰【${title}】快截止囉！\n\n還沒下單趕快點連結 👇\n截止：${dl}`,
      summary: `📦【${title}】目前\n✅ 已下單：${s?.count||0} 人\n💰 總金額：$${s?.totalRevenue||0}`,
      close: `🔒【${title}】已截止！\n\n共 ${s?.count||0} 人，感謝大家 🙏`
    };
    lastNotice = defs[type];
  }
  out.textContent = lastNotice;
  btn.style.display = 'block';
}

// ══════════════════════════════════════════════
// 關閉團購
// ══════════════════════════════════════════════
function confirmClose(buyId, title) {
  if (!confirm(`確定要關閉「${title}」嗎？\n關閉後成員就無法再下單。`)) return;
  api({ action: 'closeBuy', adminKey: CONFIG.ADMIN_KEY, groupBuyId: buyId })
    .then(res => {
      if (res.error) toast('❌ ' + res.error);
      else { toast('✅ 已關閉！'); loadStats(); }
    });
}

// ══════════════════════════════════════════════
// 工具
// ══════════════════════════════════════════════
async function api(body) {
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  return res.json();
}

function typewriter(el, text) {
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => {
    if (i < text.length) el.textContent += text[i++];
    else clearInterval(iv);
  }, 16);
}

function cpTxt(id) {
  const el = document.getElementById(id);
  navigator.clipboard?.writeText(el.textContent || el.innerText);
  toast('✅ 已複製！');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function formatDeadline(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hide');
  setTimeout(() => el.style.display = 'none', 400);
}

init();
</script>
